# ============================================================================
# Intelli-mailbox — defaults
# ============================================================================
# Privacy-by-default: local Ollama, web on :8090, BrowserTool attached to a
# real Chrome via CDP so Google's signin flow accepts us.
# ============================================================================
spring:
  application:
    name: intellimailbox
  main:
    web-application-type: servlet
    # AWT SystemTray needs a non-headless JVM. Spring Boot defaults to
    # headless=true for server apps; we override because the system-tray
    # icon (SystemTrayManager) is the primary "Quit" affordance for
    # non-technical users.
    headless: false
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:ollama}
  # NOTE: spring.autoconfigure.exclude is set per-profile in application-ollama.yml /
  # application-openai-mini.yml — Spring Boot replaces (not merges) list-typed properties
  # across profiles, so the full exclude list lives in each profile.

# We pull spring-boot-starter-data-redis only so swarmai-core's MemoryAutoConfiguration
# can class-load (it falls back to in-memory storage at runtime). The actuator's Redis
# health indicator otherwise floods the log trying to connect to localhost:6379.
management:
  health:
    redis:
      enabled: false

server:
  port: ${SERVER_PORT:8090}

swarmai:
  tools:
    browser:
      enabled: true
      mode: ${SWARMAI_BROWSER_MODE:attach}
      cdp-url: ${SWARMAI_BROWSER_CDP_URL:http://localhost:9222}
      user-data-dir: ${SWARMAI_BROWSER_USER_DATA_DIR:${user.home}/.intelliswarm/intellimailbox-chrome}
      allowed-hosts: google.com,gmail.com

intellimailbox:
  preprocessing:
    # Cap concurrent inbox rows pulled per refresh (BrowserTool is single-page-serial)
    max-emails: ${INTELLIMAILBOX_MAX_EMAILS:25}
    # Generous timeout per email — cold local Ollama can take 60s+ on CPU.
    per-email-timeout-ms: ${INTELLIMAILBOX_TIMEOUT_MS:300000}

# ============================================================================
# Logging — defaults that keep the console readable during development.
# Override with `LOGGING_LEVEL_…` env vars when debugging a specific subsystem.
# ============================================================================
logging:
  # File logging is on by default so end-users (running the MSI/DMG/DEB
  # without a console attached) leave a trail we can ask them to send back.
  # Path uses ${user.home} which Java sets correctly on every OS:
  #   Windows: C:\Users\<name>\.intelli-mailbox\logs\
  #   macOS:   /Users/<name>/.intelli-mailbox/logs/
  #   Linux:   /home/<name>/.intelli-mailbox/logs/
  # Override per-run with --logging.file.name=<path> if needed.
  file:
    name: ${user.home}/.intelli-mailbox/logs/intelli-mailbox.log
  logback:
    rollingpolicy:
      # Keep things small enough to email back if a user hits a bug.
      max-file-size: 10MB
      max-history: 7
      total-size-cap: 100MB
  pattern:
    # Drops the empty trace-id column (`[%X{traceId:-},%X{spanId:-}]`) that
    # Spring Boot's default pattern leaves blank when no tracer is configured.
    # Saves ~50 chars per line. Spring Boot uses TWO separate patterns —
    # console (stdout) and file (logfile) — so both have to be overridden.
    console: "%clr(%d{HH:mm:ss.SSS}){faint} %clr(%-5p) %clr(%-30.30logger{29}){cyan} : %m%n%wEx"
    file:    "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5p [%t] %-40.40logger{39} : %m%n%wEx"
  level:
    # SwarmEventListener emits TOOL_STARTED/TOOL_COMPLETED for every
    # browser-tool round trip — ~50 lines per email scrape. Useful for
    # debugging the agent framework itself, way too loud during normal use.
    ai.intelliswarm.swarmai.config: WARN
    # Spring Data Redis bootstrapping log fires even though we don't use
    # Redis at runtime (we depend on the starter only to satisfy swarmai-core's
    # classloader; the in-memory MemoryAutoConfiguration is what's active).
    org.springframework.data.redis.repository.configuration: WARN
    org.springframework.data.repository.config: WARN
