# ============================================================================
# OpenAI gpt-4o-mini profile — opt-in, faster + sharper than local Ollama
# ============================================================================
# Activate with: SPRING_PROFILES_ACTIVE=openai-mini OPENAI_API_KEY=sk-... ./run.sh
# Cost: ~$0.0005 per email enrichment.
# ============================================================================
spring:
  autoconfigure:
    # NOTE: this list REPLACES the base application.yml list (Spring Boot doesn't merge
    # list-typed properties across profiles). Keep the vector-store + JPA excludes here too.
    exclude:
      # Suppress Ollama + Anthropic starters — only OpenAI active in this profile.
      - org.springframework.ai.model.ollama.autoconfigure.OllamaChatAutoConfiguration
      - org.springframework.ai.model.ollama.autoconfigure.OllamaEmbeddingAutoConfiguration
      - org.springframework.ai.model.anthropic.autoconfigure.AnthropicChatAutoConfiguration
      # swarmai-tools transitively pulls Chroma + PgVector starters; both register a
      # bean named "vectorStore" → BeanDefinitionOverrideException at startup.
      - org.springframework.ai.vectorstore.pgvector.autoconfigure.PgVectorStoreAutoConfiguration
      - org.springframework.ai.vectorstore.chroma.autoconfigure.ChromaVectorStoreAutoConfiguration
      # JPA + DataSource: no entities, no datasource — Hibernate's empty-metamodel error.
      - org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration
      - org.springframework.boot.autoconfigure.data.jpa.JpaRepositoriesAutoConfiguration
      - org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration
  ai:
    openai:
      api-key: ${OPENAI_API_KEY:}
      chat:
        options:
          model: ${SPRING_AI_OPENAI_CHAT_OPTIONS_MODEL:gpt-4o-mini}
          temperature: 0.1

swarmai:
  workflow:
    model: ${SPRING_AI_OPENAI_CHAT_OPTIONS_MODEL:gpt-4o-mini}
